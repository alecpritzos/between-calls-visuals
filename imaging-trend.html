<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Between Calls — Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a1628;
    --copper:#b87333;
    --gold:#d4a574;
    --bone:#f5f0e8;
    --grid:rgba(245,240,232,0.10);
    --axis:rgba(245,240,232,0.40);
    --LOOP:30s; /* 18s sequence + ~12s hold on final frame */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Inter',system-ui,sans-serif;color:var(--bone)}

  .stage{position:fixed;inset:0;display:grid;place-items:center;background:#000}
  .frame{
    position:relative;
    width:100vw;
    height:56.25vw;
    max-height:100vh;
    max-width:177.78vh;
    background:var(--bg);
    overflow:hidden;
  }

  svg.root{position:absolute; inset:0; width:100%; height:100%; display:block;}

  /* ---------- timing map (30s loop)  t% = t/30*100 ----------
       0.0s = 0%
       0.5s = 1.67%
       2.0s = 6.67%
       3.33s= 11.1%
       4.0s = 13.3%
       4.67s= 15.6%
       6.0s = 20%
       6.67s= 22.2%
       8.0s = 26.7%
       8.67s= 28.9%
       9.67s= 32.2%
       10.0s= 33.33%
       10.67s=35.6%
       11.0s= 36.67%
       12.0s= 40%
       15.0s= 50%
       16.0s= 53.33%
       16.5s= 55%
       17.0s= 56.67%
       18.0s= 60%
       28.0s= 93.33%
       29.0s= 96.67%
       29.5s= 98.33%
       30.0s= 100%
  */

  /* TITLE fade */
  .title-block{animation:titleInOut var(--LOOP) 1 forwards cubic-bezier(.4,0,.2,1)}
  @keyframes titleInOut{
    0%   {opacity:0; transform:translateY(6px)}
    1.67%{opacity:0; transform:translateY(6px)}
    6.67%{opacity:1; transform:translateY(0)}
    96.67%,100%{opacity:1; transform:translateY(0)}
  }

  /* LINES draw: 2s -> 10s in loop, hold drawn until end */
  .draw-top,.draw-bot,.draw-comp{animation:drawLine var(--LOOP) 1 forwards cubic-bezier(0.65,0,0.35,1)}
  @keyframes drawLine{
    0%   {stroke-dashoffset:var(--len)}
    6.67%{stroke-dashoffset:var(--len)}
    33.33%{stroke-dashoffset:0}
    100% {stroke-dashoffset:0}
  }

  /* tip dots follow the path */
  .tip{animation:tipMove var(--LOOP) 1 forwards cubic-bezier(0.65,0,0.35,1); opacity:0}
  @keyframes tipMove{
    0%    {offset-distance:0%; opacity:0}
    6.67% {offset-distance:0%; opacity:0}
    7.5%  {opacity:1}
    33.33%{offset-distance:100%; opacity:1}
    98.33%{offset-distance:100%; opacity:1}
    100%  {offset-distance:100%; opacity:1}
  }

  /* YEAR TICKER — each year's slice scaled to 30s loop.
     Original: draw 0-10s maps year transitions every ~1.14s starting at 2s.
     In 30s loop: 2s=6.67%, 3.14s=10.47%, ... up to 10s=33.33%, then y6 holds until 98.33%.
  */
  .yearlbl{opacity:0}
  .yearlbl.y0{animation:yr0 var(--LOOP) 1 forwards}
  .yearlbl.y1{animation:yr1 var(--LOOP) 1 forwards}
  .yearlbl.y2{animation:yr2 var(--LOOP) 1 forwards}
  .yearlbl.y3{animation:yr3 var(--LOOP) 1 forwards}
  .yearlbl.y4{animation:yr4 var(--LOOP) 1 forwards}
  .yearlbl.y5{animation:yr5 var(--LOOP) 1 forwards}
  .yearlbl.y6{animation:yr6 var(--LOOP) 1 forwards}
  @keyframes yr0{0%,6.67%{opacity:0}6.8%{opacity:1}10.47%{opacity:1}11.1%{opacity:0}}
  @keyframes yr1{0%,10.47%{opacity:0}11.1%{opacity:1}14.8%{opacity:1}15.4%{opacity:0}}
  @keyframes yr2{0%,14.8%{opacity:0}15.4%{opacity:1}19.1%{opacity:1}19.7%{opacity:0}}
  @keyframes yr3{0%,19.1%{opacity:0}19.7%{opacity:1}23.4%{opacity:1}24%{opacity:0}}
  @keyframes yr4{0%,23.4%{opacity:0}24%{opacity:1}27.7%{opacity:1}28.3%{opacity:0}}
  @keyframes yr5{0%,27.7%{opacity:0}28.3%{opacity:1}32%{opacity:1}32.6%{opacity:0}}
  @keyframes yr6{0%,32%{opacity:0}32.6%,100%{opacity:1}}

  /* ANNOTATIONS — fade in as draw crosses each year, hold until end */
  .ann{opacity:0}
  .ann-2015{animation:ann2015 var(--LOOP) 1 forwards ease-out}
  .ann-2016{animation:ann2016 var(--LOOP) 1 forwards ease-out}
  .ann-2017{animation:ann2017 var(--LOOP) 1 forwards ease-out}
  .ann-2020{animation:ann2020 var(--LOOP) 1 forwards ease-out}
  .ann-2023{animation:ann2023 var(--LOOP) 1 forwards ease-out}
  .ann-2025{animation:ann2025 var(--LOOP) 1 forwards ease-out}
  .ann-2026{animation:ann2026 var(--LOOP) 1 forwards ease-out}
  @keyframes ann2015{0%,8.6%{opacity:0;transform:translateY(4px)}13.6%,100%{opacity:1;transform:translateY(0)}}
  @keyframes ann2016{0%,11.1%{opacity:0;transform:translateY(4px)}16%,100%{opacity:1;transform:translateY(0)}}
  @keyframes ann2017{0%,13.6%{opacity:0;transform:translateY(4px)}17.9%,100%{opacity:1;transform:translateY(0)}}
  @keyframes ann2020{0%,19.7%{opacity:0;transform:translateY(4px)}24.7%,100%{opacity:1;transform:translateY(0)}}
  @keyframes ann2023{0%,25.9%{opacity:0;transform:translateY(4px)}30.9%,100%{opacity:1;transform:translateY(0)}}
  @keyframes ann2025{0%,29.6%{opacity:0;transform:translateY(4px)}34.6%,100%{opacity:1;transform:translateY(0)}}
  @keyframes ann2026{0%,32.1%{opacity:0;transform:translateY(4px)}37.1%,100%{opacity:1;transform:translateY(0)}}

  /* GAP fill + label — come in 12-15s, hold until end */
  .gap-fill{opacity:0;animation:gapFill var(--LOOP) 1 forwards ease-out}
  @keyframes gapFill{
    0%,40%{opacity:0}
    46.7%{opacity:0.20}
    98.33%,100%{opacity:0.20}
  }
  .gap-label{opacity:0;animation:gapLabel var(--LOOP) 1 forwards ease-out}
  @keyframes gapLabel{
    0%,40%{opacity:0;transform:translateY(4px)}
    46.7%{opacity:1;transform:translateY(0)}
    98.33%,100%{opacity:1;transform:translateY(0)}
  }

  /* Closer pull quote (upper right) — 15s in, hold until end */
  .closer{opacity:0;animation:closerIn var(--LOOP) 1 forwards ease-out}
  @keyframes closerIn{
    0%,50%{opacity:0;transform:translateY(6px)}
    53.33%{opacity:1;transform:translateY(0)}
    98.33%,100%{opacity:1;transform:translateY(0)}
  }

  /* Bottom-right stat block: in at ~16-18s, hold until end */
  .statblock{opacity:0;animation:statIn var(--LOOP) 1 forwards ease-out}
  @keyframes statIn{
    0%,53.33%{opacity:0;transform:translateY(6px)}
    58.33%{opacity:1;transform:translateY(0)}
    98.33%,100%{opacity:1;transform:translateY(0)}
  }

  /* Chart chrome (axes, gridlines, titles) */
  .chart-chrome{animation:chromeIn var(--LOOP) 1 forwards ease-out}
  @keyframes chromeIn{
    0%{opacity:0}
    3.33%{opacity:0}
    8.33%{opacity:1}
    98.33%,100%{opacity:1}
  }

  /* Sources footer */
  .sources{opacity:0;animation:sourcesIn var(--LOOP) 1 forwards ease-out}
  @keyframes sourcesIn{
    0%{opacity:0}
    8.33%{opacity:0}
    11.1%{opacity:1}
    98.33%,100%{opacity:1}
  }
</style>
</head>
<body>
<div class="stage">
  <div class="frame">
    <svg class="root" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">

      <!-- ============== DEFS ============== -->
      <defs>
        <filter id="copperGlow" x="-10%" y="-60%" width="120%" height="220%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b1"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b2"/>
          <feMerge>
            <feMergeNode in="b2"/>
            <feMergeNode in="b1"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <linearGradient id="gapGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#b87333" stop-opacity="0.0"/>
          <stop offset="50%" stop-color="#b87333" stop-opacity="1"/>
          <stop offset="100%" stop-color="#b87333" stop-opacity="0.0"/>
        </linearGradient>

        <clipPath id="topClip"><rect x="160" y="170" width="1620" height="320"/></clipPath>
        <clipPath id="botClip"><rect x="160" y="610" width="1620" height="320"/></clipPath>

        <!-- Radiologists (top) path  2014..2026 -->
        <path id="lineTop" d="
          M 200,426
          C 320,420 400,416 460,412
          S 660,395 720,390
          S 920,372 980,366
          S 1180,340 1240,330
          S 1440,298 1500,284
          S 1700,238 1760,218
        " fill="none"/>

        <!-- CT volume (bottom) path  2014..2026 -->
        <path id="lineBot" d="
          M 200,854
          C 320,846 400,838 460,828
          S 660,794 720,776
          S 920,724 980,708
          S 1180,670 1240,660
          S 1440,628 1500,618
          S 1700,560 1760,518
        " fill="none"/>

        <!-- Compensation (dashed gold) — lives in TOP chart area, right-axis scale $300–$600K -->
        <path id="lineComp" d="
          M 330,422
          C 395,412 430,408 460,403
          S 660,381 720,359
          S 920,340 980,321
          S 1180,304 1240,288
          S 1440,268 1500,251
          S 1620,236 1760,217
        " fill="none"/>
      </defs>

      <!-- ============== CHART CHROME ============== -->
      <g class="chart-chrome">
        <!-- TOP CHART gridlines (radiologists, left axis) -->
        <g stroke="rgba(245,240,232,0.10)" stroke-width="1">
          <line x1="200" y1="404" x2="1760" y2="404"/>
          <line x1="200" y1="338" x2="1760" y2="338"/>
          <line x1="200" y1="272" x2="1760" y2="272"/>
          <line x1="200" y1="206" x2="1760" y2="206"/>
        </g>
        <line x1="200" y1="470" x2="1760" y2="470" stroke="rgba(245,240,232,0.30)" stroke-width="1"/>

        <!-- left y-axis labels (radiologists count, k) -->
        <g font-family="Inter" font-size="11" fill="rgba(245,240,232,0.40)" font-weight="400">
          <text x="180" y="408" text-anchor="end">32k</text>
          <text x="180" y="342" text-anchor="end">34k</text>
          <text x="180" y="276" text-anchor="end">36k</text>
          <text x="180" y="210" text-anchor="end">38k</text>
        </g>

        <!-- right y-axis labels (compensation $K) -->
        <g font-family="Inter" font-size="11" fill="#d4a574" fill-opacity="0.55" font-weight="400">
          <text x="1780" y="470" text-anchor="start">$300K</text>
          <text x="1780" y="404" text-anchor="start">$370K</text>
          <text x="1780" y="338" text-anchor="start">$440K</text>
          <text x="1780" y="272" text-anchor="start">$510K</text>
          <text x="1780" y="200" text-anchor="start">$580K</text>
        </g>
        <g stroke="#d4a574" stroke-opacity="0.30" stroke-width="1">
          <line x1="1760" y1="470" x2="1772" y2="470"/>
          <line x1="1760" y1="404" x2="1772" y2="404"/>
          <line x1="1760" y1="338" x2="1772" y2="338"/>
          <line x1="1760" y1="272" x2="1772" y2="272"/>
          <line x1="1760" y1="206" x2="1772" y2="206"/>
        </g>

        <!-- BOTTOM CHART gridlines -->
        <g stroke="rgba(245,240,232,0.10)" stroke-width="1">
          <line x1="200" y1="854" x2="1760" y2="854"/>
          <line x1="200" y1="798" x2="1760" y2="798"/>
          <line x1="200" y1="742" x2="1760" y2="742"/>
          <line x1="200" y1="686" x2="1760" y2="686"/>
          <line x1="200" y1="630" x2="1760" y2="630"/>
        </g>
        <line x1="200" y1="910" x2="1760" y2="910" stroke="rgba(245,240,232,0.30)" stroke-width="1"/>

        <g font-family="Inter" font-size="11" fill="rgba(245,240,232,0.40)" font-weight="400">
          <text x="180" y="858" text-anchor="end">75</text>
          <text x="180" y="802" text-anchor="end">80</text>
          <text x="180" y="746" text-anchor="end">85</text>
          <text x="180" y="690" text-anchor="end">90</text>
          <text x="180" y="634" text-anchor="end">95</text>
        </g>

        <!-- x-axis ticks -->
        <g stroke="rgba(245,240,232,0.25)" stroke-width="1">
          <line x1="200"  y1="910" x2="200"  y2="918"/>
          <line x1="460"  y1="910" x2="460"  y2="918"/>
          <line x1="720"  y1="910" x2="720"  y2="918"/>
          <line x1="980"  y1="910" x2="980"  y2="918"/>
          <line x1="1240" y1="910" x2="1240" y2="918"/>
          <line x1="1500" y1="910" x2="1500" y2="918"/>
          <line x1="1760" y1="910" x2="1760" y2="918"/>
        </g>
        <g font-family="Inter" font-size="11" fill="rgba(245,240,232,0.40)" font-weight="400" text-anchor="middle">
          <text x="200"  y="940">2014</text>
          <text x="460"  y="940">2016</text>
          <text x="720"  y="940">2018</text>
          <text x="980"  y="940">2020</text>
          <text x="1240" y="940">2022</text>
          <text x="1500" y="940">2024</text>
          <text x="1760" y="940">2026</text>
        </g>

        <g font-family="Inter" font-size="13" font-weight="500" fill="rgba(245,240,232,0.85)" letter-spacing="0.08em">
          <text x="200" y="160">RADIOLOGISTS (US)</text>
          <text x="1760" y="160" text-anchor="end" fill="#d4a574" fill-opacity="0.85">AVG. COMPENSATION ($K / YEAR)</text>
          <text x="200" y="600">MEDICAL IMAGING VOLUME — CT SCANS, MILLIONS / YEAR</text>
        </g>
      </g>

      <!-- ============== GAP FILL ============== -->
      <path class="gap-fill" fill="url(#gapGrad)" d="
        M 200,426
        C 320,420 400,416 460,412
        S 660,395 720,390
        S 920,372 980,366
        S 1180,340 1240,330
        S 1440,298 1500,284
        S 1700,238 1760,218
        L 1760,518
        C 1700,560 1500,618 1500,618
        C 1440,628 1240,660 1240,660
        C 1180,670 980,708 980,708
        C 920,724 720,776 720,776
        C 660,794 460,828 460,828
        C 400,838 320,846 200,854
        Z
      "/>

      <!-- ============== LINES ============== -->
      <g clip-path="url(#topClip)">
        <use href="#lineTop" class="draw-top"
          stroke="#f5f0e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          style="stroke-dasharray:var(--len); --len:1780px; stroke-dashoffset:1780px" />
      </g>

      <g clip-path="url(#topClip)">
        <use href="#lineComp" class="draw-comp"
          stroke="#d4a574" stroke-opacity="0.70" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round"
          stroke-dasharray="6 5"
          style="--len:1520px; stroke-dashoffset:1520px"
          pathLength="1520"/>
      </g>

      <circle class="tip" r="4" fill="#f5f0e8"
        style="offset-path: path('M 200,426 C 320,420 400,416 460,412 S 660,395 720,390 S 920,372 980,366 S 1180,340 1240,330 S 1440,298 1500,284 S 1700,238 1760,218');"/>

      <circle class="tip" r="3.5" fill="#d4a574"
        style="offset-path: path('M 330,422 C 395,412 430,408 460,403 S 660,381 720,359 S 920,340 980,321 S 1180,304 1240,288 S 1440,268 1500,251 S 1620,236 1760,217');"/>

      <g clip-path="url(#botClip)">
        <use href="#lineBot" class="draw-bot"
          stroke="#b87333" stroke-width="7" stroke-opacity="0.35"
          stroke-linecap="round" stroke-linejoin="round"
          filter="url(#copperGlow)"
          style="stroke-dasharray:var(--len); --len:1790px; stroke-dashoffset:1790px"/>
        <use href="#lineBot" class="draw-bot"
          stroke="#b87333" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round"
          style="stroke-dasharray:var(--len); --len:1790px; stroke-dashoffset:1790px"/>
      </g>

      <circle class="tip" r="5" fill="#d89256" filter="url(#copperGlow)"
        style="offset-path: path('M 200,854 C 320,846 400,838 460,828 S 660,794 720,776 S 920,724 980,708 S 1180,670 1240,660 S 1440,628 1500,618 S 1700,560 1760,518');"/>

      <!-- ============== TITLE ============== -->
      <g class="title-block">
        <text x="160" y="88"
              font-family="Fraunces" font-size="42" font-weight="400" fill="#f5f0e8"
              letter-spacing="-0.015em">What actually happened to radiologists.</text>
        <text x="160" y="120"
              font-family="Inter" font-size="14" font-weight="400" fill="#f5f0e8"
              fill-opacity="0.60" letter-spacing="0.18em">2014 — 2026</text>
      </g>
      <!-- ============== ANNOTATIONS ============== -->
      <g class="ann ann-2015">
        <circle cx="330" cy="420" r="3" fill="#b87333"/>
        <path d="M 330,420 L 330,500 L 370,500" fill="none" stroke="#b87333" stroke-width="1" stroke-opacity="0.55"/>
        <text x="380" y="496" font-family="Inter" font-size="10.5" font-weight="600"
              fill="#b87333" letter-spacing="0.18em">2015 · RADIOLOGISTS</text>
        <text x="380" y="515" font-family="Inter" font-size="12" fill="#f5f0e8" fill-opacity="0.82">
          32,100 in practice. Residency match fill rate: 86.7%.
        </text>
      </g>

      <g class="ann ann-2016">
        <circle cx="460" cy="412" r="3.5" fill="#b87333"/>
        <circle cx="460" cy="412" r="7" fill="none" stroke="#b87333" stroke-width="1" stroke-opacity="0.45"/>
        <path d="M 460,412 L 460,340 L 520,340" fill="none" stroke="#b87333" stroke-width="1" stroke-opacity="0.65"/>
        <text x="530" y="328" font-family="Inter" font-size="10.5" font-weight="600"
              fill="#b87333" letter-spacing="0.18em">2016 · HINTON</text>
        <text x="530" y="348" font-family="Fraunces" font-style="italic" font-size="17" fill="#d89256">
          “Stop training radiologists.”
        </text>
        <text x="530" y="368" font-family="Inter" font-size="12" fill="#f5f0e8" fill-opacity="0.72">
          Predicted replacement within 5 years.
        </text>
      </g>

      <g class="ann ann-2017">
        <circle cx="590" cy="788" r="3" fill="#b87333"/>
        <path d="M 590,788 L 590,855 L 630,855" fill="none" stroke="#b87333" stroke-width="1" stroke-opacity="0.55"/>
        <text x="640" y="852" font-family="Inter" font-size="10.5" font-weight="600"
              fill="#b87333" letter-spacing="0.18em">2017 · CHEXNET</text>
        <text x="640" y="871" font-family="Inter" font-size="12" fill="#f5f0e8" fill-opacity="0.82">
          Stanford model beats radiologists at pneumonia detection.
        </text>
      </g>

      <g class="ann ann-2020">
        <circle cx="980" cy="708" r="3" fill="#b87333"/>
        <path d="M 980,708 L 980,660 L 1020,660" fill="none" stroke="#b87333" stroke-width="1" stroke-opacity="0.55"/>
        <text x="1030" y="648" font-family="Inter" font-size="10.5" font-weight="600"
              fill="#b87333" letter-spacing="0.18em">2020 · IMAGING VOLUME</text>
        <text x="1030" y="668" font-family="Inter" font-size="12" fill="#f5f0e8" fill-opacity="0.82">
          CT scans surpass 85M / year in the US.
        </text>
      </g>

      <g class="ann ann-2023">
        <circle cx="1370" cy="300" r="3" fill="#b87333"/>
        <path d="M 1370,300 L 1370,430 L 1330,430" fill="none" stroke="#b87333" stroke-width="1" stroke-opacity="0.55"/>
        <text x="1322" y="426" font-family="Inter" font-size="10.5" font-weight="600"
              fill="#b87333" letter-spacing="0.18em" text-anchor="end">2023 · RADIOLOGISTS</text>
        <text x="1322" y="445" font-family="Inter" font-size="12" fill="#f5f0e8" fill-opacity="0.82"
              text-anchor="end">
          37,482 in practice. Match rate: 99.8%.
        </text>
      </g>

      <g class="ann ann-2025">
        <circle cx="1630" cy="232" r="3" fill="#d4a574"/>
        <path d="M 1630,232 L 1630,192 L 1580,192" fill="none" stroke="#d4a574" stroke-width="1" stroke-opacity="0.55"/>
        <text x="1572" y="188" font-family="Inter" font-size="10.5" font-weight="600"
              fill="#d4a574" letter-spacing="0.18em" text-anchor="end">2025 · HINTON</text>
        <text x="1572" y="207" font-family="Fraunces" font-style="italic" font-size="15"
              fill="#d4a574" fill-opacity="0.92" text-anchor="end">
          “Wrong on timing.”
        </text>
      </g>

      <g class="ann ann-2026">
        <!-- Top endpoint marker (radiologists line) -->
        <circle cx="1760" cy="218" r="4" fill="#f5f0e8"/>
        <circle cx="1760" cy="218" r="8" fill="none" stroke="#f5f0e8" stroke-width="1" stroke-opacity="0.5"/>
        <!-- Bottom endpoint marker (imaging volume line) -->
        <circle cx="1760" cy="518" r="4" fill="#b87333"/>

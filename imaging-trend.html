<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Between Calls â Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a1628;
    --copper:#b87333;
    --gold:#d4a574;
    --bone:#f5f0e8;
    --grid:rgba(245,240,232,0.10);
    --axis:rgba(245,240,232,0.40);
    --LOOP:30s; /* 18s sequence + ~12s hold on final frame */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Inter',system-ui,sans-serif;color:var(--bone)}

  .stage{position:fixed;inset:0;display:grid;place-items:center;background:#000}
  .frame{
    position:relative;
    width:100vw;
    height:56.25vw;
    max-height:100vh;
    max-width:177.78vh;
    background:var(--bg);
    overflow:hidden;
  }

  svg.root{position:absolute; inset:0; width:100%; height:100%; display:block;}

  /* ---------- timing map (30s loop)  t% = t/30*100 ----------
       0.0s = 0%
       0.5s = 1.67%
       2.0s = 6.67%
       3.33s= 11.1%
       4.0s = 13.3%
       4.67s= 15.6%
       6.0s = 20%
       6.67s= 22.2%
       8.0s = 26.7%
       8.67s= 28.9%
       9.67s= 32.2%
       10.0s= 33.33%
       10.67s=35.6%
       11.0s= 36.67%
       12.0s= 40%
       15.0s= 50%
       16.0s= 53.33%
       16.5s= 55%
       17.0s= 56.67%
       18.0s= 60%
       28.0s= 93.33%
       29.0s= 96.67%
       29.5s= 98.33%
       30.0s= 100%
  */

  /* TITLE fade */
  .title-block{animation:titleInOut var(--LOOP) 1 forwards cubic-bezier(.4,0,.2,1)}
  @keyframes titleInOut{
    0%   {opacity:0; transform:translateY(6px)}
    1.67%{opacity:0; transform:translateY(6px)}
    6.67%{opacity:1; transform:translateY(0)}
    96.67%,100%{opacity:1; transform:translateY(0)}
  }

  /* LINES draw: 2s -> 10s in loop, hold drawn until end */
  .draw-top,.draw-bot,.draw-comp{animation:drawLine var(--LOOP) 1 forwards cubic-bezier(0.65,0,0.35,1)}
  @keyframes drawLine{
    0%   {stroke-dashoffset:var(--len)}
    6.67%{stroke-dashoffset:var(--len)}
    33.33%{stroke-dashoffset:0}
    100% {stroke-dashoffset:0}
  }

  /* tip dots follow the path */
  .tip{animation:tipMove var(--LOOP) 1 forwards cubic-bezier(0.65,0,0.35,1); opacity:0}
  @keyframes tipMove{
    0%    {offset-distance:0%; opacity:0}
    6.67% {offset-distance:0%; opacity:0}
    7.5%  {opacity:1}
    33.33%{offset-distance:100%; opacity:1}
    98.33%{offset-distance:100%; opacity:1}
    100%  {offset-distance:100%; opacity:1}
  }

  /* YEAR TICKER â each year's slice scaled to 30s loop.
     Original: draw 0-10s maps year transitions every ~1.14s starting at 2s.
     In 30s loop: 2s=6.67%, 3.14s=10.47%, ... up to 10s=33.33%, then y6 holds until 98.33%.
  */
  .yearlbl{opacity:0}
  .yearlbl.y0{animation:yr0 var(--LOOP) 1 forwards}
  .yearlbl.y1{animation:yr1 var(--LOOP) 1 forwards}
  .yearlbl.y2{animation:yr2 var(--LOOP) 1 forwards}
  .yearlbl.y3{animation:yr3 var(--LOOP) 1 forwards}
  .yearlbl.y4{animation:yr4 var(--LOOP) 1 forwards}
  .yearlbl.y5{animation:yr5 var(--LOOP) 1 forwards}
  .yearlbl.y6{animation:yr6 var(--LOOP) 1 forwards}
  @keyframes yr0{0%,6.67%{opacity:0}6.8%{opacity:1}10.47%{opacity:1}11.1%{opacity:0}}
  @keyframes yr1{0%,10.47%{opacity:0}11.1%{opacity:1}14.8%{opacity:1}15.4%{opacity:0}}
  @keyframes yr2{0%,14.8%{opacity:0}15.4%{opacity:1}19.1%{opacity:1}19.7%{opacity:0}}
  @keyframes yr3{0%,19.1%{opacity:0}19.7%{opacity:1}23.4%{opacity:1}24%{opacity:0}}
  @keyframes yr4{0%,23.4%{opacity:0}24%{opacity:1}27.7%{opacity:1}28.3%{opacity:0}}
  @keyframes yr5{0%,27.7%{opacity:0}28.3%{opacity:1}32%{opacity:1}32.6%{opacity:0}}
  @keyframes yr6{0%,32%{opacity:0}32.6%,100%{opacity:1}}
